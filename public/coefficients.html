<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet" />
    <title>係数</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --card: #fffdf8;
        --ink: #1f2a2e;
        --accent: #0c6b58;
        --line: #d9d3c6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
        background:
          radial-gradient(circle at 10% 10%, #fff5d9 0%, transparent 45%),
          radial-gradient(circle at 90% 0%, #d8efe9 0%, transparent 35%),
          var(--bg);
        color: var(--ink);
      }
      .page {
        max-width: 720px;
        margin: 0 auto;
        padding: 16px 14px 28px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }
      h1 {
        margin: 0;
        font-size: 27px;
        font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
        font-weight: 900;
        letter-spacing: 0.01em;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0 0 12px;
      }
      .menu-wrap { position: relative; }
      .menu-btn {
        width: 44px;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        color: var(--ink);
        font-size: 22px;
        line-height: 1;
        padding: 0;
      }
      .menu-panel {
        position: absolute;
        right: 0;
        top: 50px;
        min-width: 168px;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        padding: 6px;
      }
      .menu-item {
        display: block;
        width: 100%;
        text-align: left;
        background: #fff;
        color: var(--ink);
        border: 0;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 14px;
        white-space: nowrap;
      }
      .menu-item:hover { background: #f6f3eb; }
      .hidden { display: none; }
      .field { margin-bottom: 10px; }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 14px;
      }
      input, select, button {
        width: 100%;
        max-width: 100%;
        min-width: 0;
        min-height: 44px;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 10px 12px;
        font-size: 16px;
        background: #fff;
      }
      input[type="date"] {
        -webkit-appearance: none;
        appearance: none;
      }
      button {
        border: none;
        background: linear-gradient(90deg, var(--accent), #109a7e);
        color: #fff;
        font-weight: 700;
      }
      .list-title {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 14px;
      }
      .group {
        margin: 12px 0;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        font-size: 14px;
        border-top: 1px dashed var(--line);
        padding: 8px 0;
      }
      .row:first-of-type { border-top: 0; }
      .muted { color: #606b6f; font-size: 13px; }
      .err { color: #c23131; font-size: 13px; min-height: 1.2em; }
      .divider {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 12px 0;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="header">
          <h1>係数</h1>
          <div class="menu-wrap">
            <button id="menuBtn" class="menu-btn" type="button" aria-label="メニュー">☰</button>
            <div id="menuPanel" class="menu-panel hidden">
              <button id="mainPageBtn" class="menu-item" type="button">トレーニング記録</button>
              <button id="historyBtn" class="menu-item" type="button">過去ログ一覧</button>
              <button id="gearPageBtn" class="menu-item" type="button">ギア管理</button>
              <button id="coefficientsPageBtn" class="menu-item" type="button">係数</button>
            </div>
          </div>
        </div>

        <div class="field">
          <label for="name">名前</label>
          <select id="name">
            <option value="" selected>選択してください</option>
          </select>
        </div>

        <div id="customNameField" class="field hidden">
          <input id="customName" type="text" placeholder="名前を入力" />
        </div>

        <div class="field">
          <label for="value">係数</label>
          <input id="value" type="number" step="any" />
        </div>

        <div class="field">
          <label for="startDate">開始日</label>
          <input id="startDate" type="date" />
        </div>

        <button id="updateBtn" type="button">係数更新</button>
        <p id="error" class="err"></p>

        <hr class="divider" />

        <div class="list-title">係数一覧</div>
        <div id="coefficients"></div>
      </section>
    </main>

    <script>
      const menuBtn = document.getElementById("menuBtn");
      const menuPanel = document.getElementById("menuPanel");
      const mainPageBtn = document.getElementById("mainPageBtn");
      const historyBtn = document.getElementById("historyBtn");
      const gearPageBtn = document.getElementById("gearPageBtn");
      const coefficientsPageBtn = document.getElementById("coefficientsPageBtn");
      const nameEl = document.getElementById("name");
      const customNameFieldEl = document.getElementById("customNameField");
      const customNameEl = document.getElementById("customName");
      const valueEl = document.getElementById("value");
      const startDateEl = document.getElementById("startDate");
      const updateBtn = document.getElementById("updateBtn");
      const coefficientsEl = document.getElementById("coefficients");
      const errorEl = document.getElementById("error");

      const OTHER = "その他(自由入力)";

      function renderNameOptions(names) {
        nameEl.innerHTML =
          '<option value="" selected>選択してください</option>' +
          names.map((name) => `<option value="${name}">${name}</option>`).join("") +
          `<option value="${OTHER}">${OTHER}</option>`;
      }

      function renderCoefficients(rows) {
        if (!rows.length) {
          coefficientsEl.innerHTML = '<div class="group"><div class="muted">表示できる係数がありません。</div></div>';
          return;
        }

        coefficientsEl.innerHTML = rows.map((row) => {
          const startDate = String(row.start_date || "").slice(0, 10);
          return `
            <div class="group">
              <div class="row">
                <div>
                  <strong>${row.name}</strong><br>
                  <span class="muted">係数: ${row.value} / 開始日: ${startDate}</span>
                </div>
              </div>
            </div>
          `;
        }).join("");
      }

      function toggleCustomName() {
        const isOther = nameEl.value === OTHER;
        customNameFieldEl.classList.toggle("hidden", !isOther);
        if (!isOther) customNameEl.value = "";
      }

      async function loadCoefficients() {
        const res = await fetch("/api/coefficients");
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || "係数一覧の取得に失敗しました");
        }

        const data = await res.json();
        renderNameOptions(Array.isArray(data.names) ? data.names : []);
        renderCoefficients(Array.isArray(data.coefficients) ? data.coefficients : []);
      }

      async function updateCoefficient() {
        errorEl.textContent = "";

        const body = {
          name: nameEl.value,
          customName: customNameEl.value,
          value: valueEl.value,
          start_date: startDateEl.value
        };

        const finalName = body.name === OTHER ? body.customName.trim() : body.name;
        if (!finalName || !body.start_date) {
          errorEl.textContent = "name, start_date is required";
          return;
        }

        const res = await fetch("/api/coefficients", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          errorEl.textContent = err.error || "係数更新に失敗しました";
          return;
        }

        nameEl.value = "";
        customNameEl.value = "";
        valueEl.value = "";
        startDateEl.value = "";
        toggleCustomName();
        await loadCoefficients();
      }

      menuBtn.addEventListener("click", () => {
        menuPanel.classList.toggle("hidden");
      });
      mainPageBtn.addEventListener("click", () => {
        menuPanel.classList.add("hidden");
        window.location.href = "/";
      });
      historyBtn.addEventListener("click", () => {
        menuPanel.classList.add("hidden");
        window.location.href = "/history.html";
      });
      gearPageBtn.addEventListener("click", () => {
        menuPanel.classList.add("hidden");
        window.location.href = "/gear.html";
      });
      coefficientsPageBtn.addEventListener("click", () => {
        menuPanel.classList.add("hidden");
      });
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".menu-wrap")) {
          menuPanel.classList.add("hidden");
        }
      });
      nameEl.addEventListener("change", toggleCustomName);
      updateBtn.addEventListener("click", updateCoefficient);

      loadCoefficients().catch((err) => {
        errorEl.textContent = err?.message || "初期化に失敗しました";
      });
    </script>
  </body>
</html>

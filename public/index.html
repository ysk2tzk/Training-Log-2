<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet" />
    <title>Training Log</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --card: #fffdf8;
        --ink: #1f2a2e;
        --accent: #0c6b58;
        --accent-2: #d8a31a;
        --line: #d9d3c6;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
        background:
          radial-gradient(circle at 10% 10%, #fff5d9 0%, transparent 45%),
          radial-gradient(circle at 90% 0%, #d8efe9 0%, transparent 35%),
          var(--bg);
        color: var(--ink);
      }

      .page {
        max-width: 720px;
        margin: 0 auto;
        padding: 16px 14px 28px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }

      h1 {
        margin: 0;
        font-size: 27px;
        font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
        font-weight: 900;
        letter-spacing: 0.01em;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0 0 12px;
      }
      .menu-btn {
        width: 44px;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        color: var(--ink);
        font-size: 22px;
        line-height: 1;
        padding: 0;
      }
      .menu-wrap {
        position: relative;
      }
      .menu-panel {
        position: absolute;
        right: 0;
        top: 50px;
        min-width: 140px;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        padding: 6px;
      }
      .menu-item {
        display: block;
        width: 100%;
        text-align: left;
        background: #fff;
        color: var(--ink);
        border: 0;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 14px;
      }
      .menu-item:hover { background: #f6f3eb; }
      .hidden { display: none; }

      .field { margin-bottom: 10px; }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 14px;
      }

      input, select, button {
        width: 100%;
        min-height: 44px;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 10px 12px;
        font-size: 16px;
        background: white;
      }

      button {
        border: none;
        background: linear-gradient(90deg, var(--accent), #109a7e);
        color: white;
        font-weight: 700;
      }

      #totalScore {
        margin: 14px 0;
        font-size: 34px;
        font-weight: 900;
        text-align: right;
      }

      .score-positive { color: #1f57d6; }
      .score-negative { color: #c23131; }
      .score-unit { color: var(--ink); }

      .score-label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 14px;
      }
      .list-title {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 14px;
      }

      .group {
        margin: 12px 0;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        font-size: 14px;
        border-top: 1px dashed var(--line);
        padding: 8px 0;
      }

      .row:first-of-type { border-top: 0; }
      .muted { color: #606b6f; font-size: 13px; }
      .err { color: #c23131; font-size: 13px; min-height: 1.2em; }
      .divider {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 12px 0;
      }
      .delete-btn {
        width: auto;
        min-height: 32px;
        padding: 6px 10px;
        font-size: 12px;
        background: #d44b4b;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="header">
          <h1>トレーニング記録</h1>
          <div class="menu-wrap">
            <button id="menuBtn" class="menu-btn" type="button" aria-label="メニュー">☰</button>
            <div id="menuPanel" class="menu-panel hidden">
              <button id="gearManageBtn" class="menu-item" type="button">ギア管理</button>
            </div>
          </div>
        </div>

        <div class="field">
          <label for="date">日付</label>
          <input id="date" type="date" />
        </div>

        <div class="field">
          <label for="category">カテゴリ</label>
          <select id="category">
            <option value="" selected>選択してください</option>
            <option value="Training">Training</option>
            <option value="Reward">Reward</option>
          </select>
        </div>

        <div id="itemField" class="field hidden">
          <label for="item">アイテム</label>
          <select id="item">
            <option value="" selected>選択してください</option>
          </select>
        </div>

        <div id="dynamicFields"></div>

        <button id="addBtn" type="button">追加</button>
        <p class="err" id="error"></p>
        <hr class="divider" />

        <div class="score-label">累計スコア</div>
        <div id="totalScore">0</div>
        <hr class="divider" />

        <div class="list-title">記録一覧</div>
        <div id="logs"></div>
      </section>
    </main>

    <script>
      const dateEl = document.getElementById("date");
      const categoryEl = document.getElementById("category");
      const itemFieldEl = document.getElementById("itemField");
      const itemEl = document.getElementById("item");
      const dynamicFieldsEl = document.getElementById("dynamicFields");
      const addBtn = document.getElementById("addBtn");
      const totalScoreEl = document.getElementById("totalScore");
      const logsEl = document.getElementById("logs");
      const errorEl = document.getElementById("error");
      const menuBtn = document.getElementById("menuBtn");
      const menuPanel = document.getElementById("menuPanel");
      const gearManageBtn = document.getElementById("gearManageBtn");

      const OTHER = "その他(自由入力)";
      let options = { trainingItems: [], rewardItems: [], gears: [] };

      dateEl.value = new Date().toISOString().slice(0, 10);

      function renderItemOptions() {
        const cat = categoryEl.value;
        if (!cat) {
          itemFieldEl.classList.add("hidden");
          itemEl.innerHTML = `<option value="" selected>選択してください</option>`;
          return;
        }
        itemFieldEl.classList.remove("hidden");
        const items = cat === "Training" ? options.trainingItems : options.rewardItems;
        const all = [...new Set(items)].sort((a, b) => a.localeCompare(b, "ja"));
        all.push(OTHER);

        itemEl.innerHTML =
          `<option value="" selected>選択してください</option>` +
          all.map((v) => `<option value="${v}">${v}</option>`).join("");
      }

      function fieldHtml(id, label, type, placeholder = "") {
        return `
          <div class="field">
            <label for="${id}">${label}</label>
            <input id="${id}" type="${type}" placeholder="${placeholder}" />
          </div>
        `;
      }

      function selectHtml(id, label, values) {
        return `
          <div class="field">
            <label for="${id}">${label}</label>
            <select id="${id}">
              <option value="">選択してください</option>
              ${values.map((v) => `<option value="${v}">${v}</option>`).join("")}
            </select>
          </div>
        `;
      }

      function renderDynamicFields() {
        const cat = categoryEl.value;
        const item = itemEl.value;
        if (!cat || !item) {
          dynamicFieldsEl.innerHTML = "";
          return;
        }

        if (cat === "Training") {
          if (item === "ラン" || item === "バイク") {
            const repsPlaceholder = item === "バイク" ? "min" : "0.0km";
            const repsLabel = item === "バイク" ? "継続時間" : "距離";
            dynamicFieldsEl.innerHTML =
              fieldHtml("reps", repsLabel, "number", repsPlaceholder) +
              selectHtml("gear", "Gear", options.gears);
            return;
          }

          if (item === OTHER) {
            dynamicFieldsEl.innerHTML =
              fieldHtml("customItem", "", "text", "アイテム名") +
              fieldHtml("weight", "Weight", "number", "0.0kg") +
              fieldHtml("reps", "Reps", "number", "回") +
              selectHtml("gear", "Gear", options.gears);
            return;
          }

          dynamicFieldsEl.innerHTML =
            fieldHtml("weight", "Weight", "number", "0.0kg") +
            fieldHtml("reps", "Reps", "number", "回");
          return;
        }

        if (cat === "Reward") {
          dynamicFieldsEl.innerHTML =
            (item === OTHER ? fieldHtml("customItem", "", "text", "アイテム名") : "") +
            fieldHtml("reps", "価格", "number", "円");
        }
      }

      function byDateGroups(logs) {
        const m = new Map();
        for (const l of logs) {
          const day = String(l.created_at || "").slice(0, 10);
          if (!m.has(day)) m.set(day, []);
          m.get(day).push(l);
        }
        return [...m.entries()].sort((a, b) => (a[0] < b[0] ? 1 : -1));
      }

      function renderLogs(logs) {
        const groups = byDateGroups(logs);
        logsEl.innerHTML = groups.map(([date, rows]) => `
          <div class="group">
            <div><strong>${date}</strong></div>
            ${rows.map((r) => `
              <div class="row">
                <div>${
                  r.category === "Training"
                    ? (r.item === "ラン"
                        ? `${r.item}${r.gear ? ` (${r.gear})` : ""}<br><span class="muted">${r.reps}km / ${r.score}pts</span>`
                        : r.item === "バイク"
                          ? `${r.item}${r.gear ? ` (${r.gear})` : ""}<br><span class="muted">${r.reps}min / ${r.score}pts</span>`
                        : `${r.item}<br><span class="muted">${r.weight}kg / ${r.reps}回 / ${r.score}pts</span>`)
                    : `${r.item}<br><span class="muted">${r.reps}円 / ${r.score}pts</span>`
                }</div>
                <div><button class="delete-btn" type="button" data-log-id="${r.id}">削除</button></div>
              </div>
            `).join("")}
          </div>
        `).join("");
      }

      async function loadOptions() {
        const res = await fetch("/api/options");
        options = await res.json();
        renderItemOptions();
        dynamicFieldsEl.innerHTML = "";
      }

      async function loadSummary() {
        const res = await fetch("/api/summary");
        const data = await res.json();
        const score = Number(data.totalScore || 0);
        const scoreClass = score >= 0 ? "score-positive" : "score-negative";
        totalScoreEl.innerHTML = `<span class="${scoreClass}">${score}</span> <span class="score-unit">pts</span>`;
        renderLogs(data.logs);
      }

      async function addLog() {
        errorEl.textContent = "";
        const cat = categoryEl.value;
        const item = itemEl.value;
        const body = {
          date: dateEl.value,
          category: cat,
          item,
          customItem: document.getElementById("customItem")?.value || "",
          weight: document.getElementById("weight")?.value || 0,
          reps: document.getElementById("reps")?.value || 0,
          gear: document.getElementById("gear")?.value || ""
        };

        const res = await fetch("/api/logs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const err = await res.json();
          errorEl.textContent = err.error || "保存に失敗しました";
          return;
        }

        await loadOptions();
        await loadSummary();
        renderDynamicFields();
      }

      async function deleteLog(id) {
        errorEl.textContent = "";
        const confirmed = window.confirm("この記録を削除しますか？");
        if (!confirmed) return;

        const res = await fetch(`/api/logs/${id}`, { method: "DELETE" });
        if (!res.ok) {
          const err = await res.json();
          errorEl.textContent = err.error || "削除に失敗しました";
          return;
        }

        await loadOptions();
        await loadSummary();
        renderDynamicFields();
      }

      categoryEl.addEventListener("change", () => {
        renderItemOptions();
        renderDynamicFields();
      });

      itemEl.addEventListener("change", renderDynamicFields);
      addBtn.addEventListener("click", addLog);
      menuBtn.addEventListener("click", () => {
        menuPanel.classList.toggle("hidden");
      });
      gearManageBtn.addEventListener("click", () => {
        menuPanel.classList.add("hidden");
        window.location.href = "/gear.html";
      });
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".menu-wrap")) {
          menuPanel.classList.add("hidden");
        }
      });
      logsEl.addEventListener("click", (e) => {
        const btn = e.target.closest(".delete-btn");
        if (!btn) return;
        const id = Number(btn.dataset.logId);
        if (!Number.isFinite(id)) return;
        deleteLog(id);
      });

      Promise.all([loadOptions(), loadSummary()]).catch(() => {
        errorEl.textContent = "初期化に失敗しました";
      });
    </script>
  </body>
</html>
